name: Brew Formula Validation

# Validates formula generation on every PR that touches packaging/homebrew/.
# Runs on Ubuntu so does not need a Mac — only checks syntax + generation logic.

on:
  pull_request:
    paths: ["packaging/homebrew/**"]
  push:
    branches: [main]
    paths: ["packaging/homebrew/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  brew-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install homebrew-pypi-poet

      - name: Dry-run formula generation (latest PyPI version)
        run: |
          python packaging/homebrew/generate_formula.py --version 0.3.0 --dry-run > /tmp/formula.rb
          echo "=== Generated formula (first 30 lines) ==="
          head -30 /tmp/formula.rb

      - name: Syntax check (ruby -c)
        run: ruby -c /tmp/formula.rb

      - name: Verify class name
        run: |
          grep -q "class AiDataPlatform" /tmp/formula.rb \
            && echo "class AiDataPlatform: OK" \
            || { echo "ERROR: class AiDataPlatform not found"; exit 1; }

      - name: Verify test block
        run: |
          grep -q "def install" /tmp/formula.rb \
            && grep -q "def test" /tmp/formula.rb \
            && echo "install + test blocks: OK" \
            || { echo "ERROR: install or test block missing"; exit 1; }

      - name: Verify resource blocks exist
        run: |
          COUNT=$(grep -c "^  resource " /tmp/formula.rb || true)
          echo "Resource blocks found: $COUNT"
          if [[ "$COUNT" -lt 10 ]]; then
            echo "WARNING: fewer resource blocks than expected (>10 expected)"
          fi

  brew-formula-current:
    runs-on: ubuntu-latest
    needs: brew-formula
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch current PyPI version
        run: |
          VERSION=$(curl -s https://pypi.org/pypi/ai-data-platform/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "Current PyPI version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install poet
        run: pip install homebrew-pypi-poet

      - name: Generate formula for current PyPI version
        run: |
          python packaging/homebrew/generate_formula.py --version "$VERSION" --dry-run > /tmp/formula_current.rb
          ruby -c /tmp/formula_current.rb
          echo "Formula for $VERSION: OK"
