name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,all]"
      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .
        continue-on-error: false
      - name: Types (mypy)
        run: mypy src
      - name: Tests
        run: pytest -q
      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit --skip-editable || true  # report-only until baseline is curated

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Fresh-venv install smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/adp version
          /tmp/smoke/bin/python -c "import ai_data_platform; print(ai_data_platform.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
