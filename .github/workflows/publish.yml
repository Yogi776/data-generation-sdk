# Publishing via PyPI Trusted Publishing (OIDC) — no API tokens anywhere.
#
# One-time setup on pypi.org / test.pypi.org -> project -> Publishing:
#   owner: <github-owner>  repo: ai-data-platform
#   workflow: publish.yml  environment: pypi (or testpypi)
#
# Flow: tag vX.Y.ZrcN -> TestPyPI;  GitHub Release -> PyPI.

name: Publish

on:
  push:
    tags: ["v*rc*"]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    if: github.event_name == 'push'   # rc tags only
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write   # OIDC — scoped to this job only
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi   # protect this environment with required reviewers
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  post-publish-smoke:
    if: github.event_name == 'release'
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install from PyPI and smoke test
        run: |
          sleep 60  # index propagation
          pip install ai-data-platform
          adp version
