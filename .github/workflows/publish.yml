# Publishing via PyPI Trusted Publishing (OIDC) — no API tokens anywhere.
#
# One-time setup on pypi.org / test.pypi.org -> project -> Publishing:
#   owner: <github-owner>  repo: ai-data-platform
#   workflow: publish.yml  environment: pypi (or testpypi)
#
# Flow: tag vX.Y.ZrcN -> TestPyPI;  GitHub Release -> PyPI.

name: Publish

on:
  push:
    tags: ["v*rc*"]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    if: github.event_name == 'push'   # rc tags only
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write   # OIDC — scoped to this job only
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi   # protect this environment with required reviewers
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  post-publish-smoke:
    if: github.event_name == 'release'
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install from PyPI and smoke test
        run: |
          sleep 60  # index propagation
          pip install ai-data-platform
          adp version

  update-homebrew-tap:
    if: github.event_name == 'release'
    needs: post-publish-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Wait for PyPI propagation
        run: sleep 90

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV
          echo "Tag: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formula generator dependencies
        run: pip install homebrew-pypi-poet

      - name: Generate formula
        working-directory: packaging/homebrew
        run: |
          python generate_formula.py --version "${{ env.VERSION }}" --dry-run > /tmp/formula.rb
          echo "=== Generated formula (first 40 lines) ==="
          head -40 /tmp/formula.rb
          ruby -c /tmp/formula.rb

      - name: Clone homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: Yogi776/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          sparse-checkout: |
            Formula
          sparse-checkout-cone-mode: false

      - name: Write formula
        run: |
          python packaging/homebrew/generate_formula.py \
            --version "${{ env.VERSION }}" \
            --output homebrew-tap/Formula/ai-data-platform.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ai-data-platform.rb
          git diff --staged --quiet \
            && { echo "No changes — formula unchanged"; exit 0; }
          git commit -m "ai-data-platform ${{ env.VERSION }}"
          git push origin main

      - name: Trigger tap CI
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Yogi776/homebrew-tap/dispatches \
            -d '{"event_type":"formula-updated"}'
