version: 1
tables:
  - name: patient
    joins:
      - name: admission
        relationship: one_to_many
        sql: "{TABLE.patient_id} = {admission.patient_id}"
      - name: insurance_policy
        relationship: one_to_one
        sql: "{TABLE.patient_id} = {insurance_policy.patient_id}"
    columns:
      - {name: patient_id, type: uuid, primary_key: true}
      - {name: mrn, type: string, format: "MRN-#######"}
      - {name: full_name, type: string}
      - {name: gender, type: string, values: {Male: 49, Female: 49, Other: 2}}
      - {name: date_of_birth, type: date, start: 1935-01-01, end: 2020-12-31}
      - {name: blood_group, type: string,
         values: {"O+": 37, "A+": 30, "B+": 17, "AB+": 6, "O-": 5, "A-": 3, "B-": 1.5, "AB-": 0.5}}
      - {name: state, type: string, values: {Maharashtra: 40, Karnataka: 35, Delhi: 25}}
      - name: city
        type: string
        values_by:
          column: state
          mapping:
            Maharashtra: {Mumbai: 60, Pune: 40}
            Karnataka: {Bangalore: 100}
            Delhi: {"New Delhi": 100}
  - name: admission
    columns:
      - {name: admission_id, type: uuid, primary_key: true}
      - {name: patient_id, type: uuid}
      - {name: department, type: string,
         values: {Cardiology: 20, Orthopedics: 18, General: 30, ICU: 12, Pediatrics: 20}}
      - {name: admission_date, type: datetime, start: 2024-01-01, end: 2026-06-30}
      - name: discharge_date
        type: datetime
        start: 2024-01-01
        end: 2026-06-30
        after: {column: admission_date, min_minutes: 720, max_minutes: 20160}  # 12h–14d
      - {name: bed_charges_per_day, type: float, mean: 4500, std: 2500, min: 800}
      - {name: stay_days, type: int, min: 1, max: 14, mean: 4, std: 3}
      - {name: total_bill, type: float, expr: "bed_charges_per_day * stay_days"}
      - {name: discharge_status, type: string,
         values: {Recovered: 78, Referred: 10, LAMA: 7, Deceased: 5}}
      - name: death_cause
        type: string
        values: {cardiac_arrest: 40, multi_organ_failure: 35, sepsis: 25}
        null_unless: "discharge_status = 'Deceased'"
  - name: insurance_policy
    columns:
      - {name: policy_id, type: uuid, primary_key: true}
      - {name: patient_id, type: uuid}
      - {name: policy_number, type: string, format: "POL-??-########"}
      - {name: insurer, type: string,
         values: {StarHealth: 30, HDFC_Ergo: 25, ICICI_Lombard: 25, NewIndia: 20}}
      - {name: sum_insured, type: float, values: {"300000": 40, "500000": 35, "1000000": 25}}
