version: 1
tables:
  - name: products
    rows: 20                 # declared in the spec itself
    columns:
      - {name: product_id, type: uuid, primary_key: true}
      - {name: product_name, type: string}
      - {name: sku, type: string, format: "SKU-?????-###"}
      - {name: category, type: string, values: {electronics: 40, apparel: 35, home: 25}}
      - {name: unit_price, type: float, mean: 1500, std: 1200, min: 50}
  - name: customers
    rows: 1000
    columns:
      - {name: customer_id, type: uuid, primary_key: true}
      - {name: full_name, type: string}
      - {name: email, type: string}
      - {name: city, type: string, values: {Mumbai: 35, Pune: 25, Bangalore: 25, Delhi: 15}}
  - name: transactions
    rows: 100000
    joins:
      - name: customers
        relationship: many_to_one
        sql: "{TABLE.customer_id} = {customers.customer_id}"
      - name: products
        relationship: many_to_one
        sql: "{TABLE.product_id} = {products.product_id}"
    columns:
      - {name: transaction_id, type: uuid, primary_key: true}
      - {name: customer_id, type: uuid}
      - {name: product_id, type: uuid}
      - {name: txn_date, type: datetime, start: 2025-01-01, end: 2026-06-30}
      - {name: quantity, type: int, min: 1, max: 8, mean: 2}
      - {name: amount, type: float, mean: 2200, std: 1900, min: 50}
      - {name: payment_method, type: string,
         values: {UPI: 40, "Credit Card": 22, "Debit Card": 15, Wallet: 10, COD: 8, PayPal: 5}}
      - {name: status, type: string, values: {success: 93, failed: 4, refunded: 3}}
