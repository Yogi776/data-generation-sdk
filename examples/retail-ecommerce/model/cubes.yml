cubes:
- name: customers
  sql_table: customers
  dimensions:
    customer_id:
      sql: customer_id
      type: number
      primary_key: true
    full_name:
      sql: full_name
      type: string
    email:
      sql: email
      type: string
    phone:
      sql: phone
      type: string
    city:
      sql: city
      type: string
    segment:
      sql: segment
      type: string
    is_active:
      sql: is_active
      type: boolean
    signup_date:
      sql: signup_date
      type: time
  measures: {}
- name: orders
  sql_table: orders
  dimensions:
    order_id:
      sql: order_id
      type: number
      primary_key: true
    customer_id:
      sql: customer_id
      type: string
    product_id:
      sql: product_id
      type: string
    channel:
      sql: channel
      type: string
    status:
      sql: status
      type: string
    order_date:
      sql: order_date
      type: time
  measures:
    count:
      type: count
    quantity_sum:
      type: sum
      sql: quantity
    total_amount_sum:
      type: sum
      sql: total_amount
  joins:
    customers:
      sql: '{CUBE}.customer_id = {customers}.customer_id'
      relationship: many_to_one
    products:
      sql: '{CUBE}.product_id = {products}.product_id'
      relationship: many_to_one
- name: products
  sql_table: products
  dimensions:
    product_id:
      sql: product_id
      type: number
      primary_key: true
    product_name:
      sql: product_name
      type: string
    category:
      sql: category
      type: string
    is_discontinued:
      sql: is_discontinued
      type: boolean
  measures:
    count:
      type: count
    unit_price_avg:
      type: avg
      sql: unit_price
    stock_quantity_sum:
      type: sum
      sql: stock_quantity
- name: transactions
  sql_table: transactions
  dimensions:
    transaction_id:
      sql: transaction_id
      type: number
      primary_key: true
    order_id:
      sql: order_id
      type: string
    payment_method:
      sql: payment_method
      type: string
    tx_status:
      sql: tx_status
      type: string
    transaction_date:
      sql: transaction_date
      type: time
  measures:
    count:
      type: count
    amount_sum:
      type: sum
      sql: amount
  joins:
    orders:
      sql: '{CUBE}.order_id = {orders}.order_id'
      relationship: many_to_one
