        type: float
        values_by:
          column: category
          mapping:
            Electronics:
              "79999": 10
              "49999": 20
              "29999": 25
              "14999": 25
              "7999": 20
            Apparel:
              "2999": 15
              "1999": 25
              "1499": 25
              "999": 20
              "599": 15
            "Home & Kitchen":
              "24999": 8
              "14999": 12
              "9999": 18
              "4999": 22
              "2999": 20
              "1499": 20
            Beauty:
              "2999": 10
              "1499": 20
              "999": 25
              "599": 25
              "299": 20
            Sports:
              "9999": 10
              "4999": 18
              "2999": 25
              "1499": 27
              "799": 20
            Books:
              "1499": 10
              "999": 20
              "699": 25
              "499": 25
              "299": 20
            Toys:
              "4999": 12
              "2999": 18
              "1499": 25
              "999": 25
              "499": 20
        expr: CAST(unit_price AS DOUBLE)

      # cost_price derived from unit_price — cast required (values_by stores strings)
      - name: cost_price
        type: float
        expr: CAST(unit_price AS DOUBLE) * 0.50

      # weight_kg — global distribution (values_by is categorical-only)
      - name: weight_kg
        type: float
        mean: 1.5
        std: 3.0
        min: 0.02
        max: 30.0

      - name: is_active
        type: bool
        values:
          "true": 90
          "false": 10

      - name: stock_quantity
        type: int
        mean: 150
        std: 200
        min: 0
        max: 5000

      - name: reorder_level
        type: int
        mean: 30
        std: 20
        min: 5
        max: 200

      - name: lead_time_days
        type: int
        mean: 7
        std: 5
        min: 1
        max: 30

      # return_rate — global with apparel-skewed mean
      - name: return_rate
        type: float
        mean: 0.06
        std: 0.05
        min: 0.0
        max: 0.25

      # Fix 7: total_reviews — tightened realistic ranges
      - name: total_reviews
        type: int
        mean: 180
        std: 400
        min: 0
        max: 5000

      # Fix 8: launch_date — end capped at 2026-07-01, no future dates
      - name: launch_date
        type: date
        start: 2018-01-01
        end: 2026-07-01

      - name: created_at
        type: datetime
        start: 2018-01-01
        end: 2026-07-01

  # ═══════════════════════════════════════════════════════════
  # fact_order
  # ═══════════════════════════════════════════════════════════
  - name: fact_order
    rows: 3000000
    joins:
      - name: dim_customer
        relationship: many_to_one
        sql: "{TABLE.customer_id} = {dim_customer.customer_id}"
    columns:
      - name: order_id
        type: uuid
        primary_key: true

      - name: order_number
        type: string

      - name: customer_id
        type: uuid

      - name: order_date
        type: datetime
        start: 2025-01-01
        end: 2026-06-30

      - name: order_status
        type: string
        values:
          Delivered: 75
          Shipped: 10
          Processing: 8
          Cancelled: 5
          Returned: 2

      - name: payment_date
        type: datetime
        start: 2025-01-01
        end: 2026-06-30
        after:
          column: order_date
          min_minutes: 1
          max_minutes: 180

      - name: shipment_date
        type: datetime
        start: 2025-01-01
        end: 2026-06-30
        after:
          column: order_date
          min_minutes: 360
          max_minutes: 2880

      - name: delivery_date
        type: datetime
        start: 2025-01-02
        end: 2026-06-30
        after:
          column: shipment_date
          min_minutes: 1440
          max_minutes: 10080

      - name: payment_method
        type: string
        values:
          UPI: 38
          Credit Card: 24
          Debit Card: 18
          Wallet: 10
          COD: 10

      - name: payment_status
        type: string
        values:
          Paid: 88
          Pending: 6
          Failed: 3
          Refunded: 3

      - name: subtotal
        type: float
        mean: 1800
        std: 1500
        min: 100

      - name: discount_amount
        type: float
        mean: 120
        std: 200
        min: 0

      - name: coupon_code
        type: string
        null_ratio: 0.6

      - name: tax_amount
        type: float
        expr: subtotal * 0.18

      - name: shipping_charge
        type: float
        values:
          "49.0": 50
          "99.0": 30
          "149.0": 15
          "0.0": 5

      - name: total_amount
        type: float
        expr: subtotal + tax_amount + shipping_charge - discount_amount

      - name: refund_amount
        type: float
        expr: CASE WHEN order_status = 'Returned' THEN total_amount ELSE 0.0 END
        null_ratio: 0.93

      - name: refund_reason
        type: string
        values:
          damaged: 30
          wrong_item: 25
          not_as_described: 25
          size_issue: 15
          late_delivery: 5
        null_unless: order_status = 'Returned'

      - name: shipping_provider
        type: string
        values:
          Delhivery: 28
          BlueDart: 22
          Ekart: 22
          DTDC: 15
          XpressBees: 13

      - name: fulfillment_type
        type: string
        values:
          Standard: 65
          Express: 22
          "Same Day": 13

      - name: warehouse_location
        type: string
        values:
          Mumbai: 25
          Delhi: 22
          Bangalore: 20
          Hyderabad: 18
          Chennai: 15

      - name: customer_rating
        type: int
        values:
          "5": 45
          "4": 28
          "3": 12
          "2": 8
          "1": 7
        null_ratio: 0.25

      - name: device_type
        type: string
        values:
          Android: 52
          iPhone: 28
          Desktop: 15
          Tablet: 5

      - name: source_channel
        type: string
        values:
          "Mobile App": 50
          Website: 35
          Marketplace: 15

      - name: marketing_campaign
        type: string
        values:
          none: 55
          summer_sale: 15
          diwali_2025: 15
          new_user_30: 10
          loyalty_bonus: 5

      - name: ip_address
        type: string

      - name: created_at
        type: datetime
        start: 2025-01-01
        end: 2026-06-30

  # ═══════════════════════════════════════════════════════════
  # fact_order_item
  # ═══════════════════════════════════════════════════════════
  - name: fact_order_item
    rows: 10000000
    joins:
      - name: fact_order
        relationship: many_to_one
        sql: "{TABLE.order_id} = {fact_order.order_id}"
      - name: dim_product
        relationship: many_to_one
        sql: "{TABLE.product_id} = {dim_product.product_id}"
      - name: dim_customer
        relationship: many_to_one
        sql: "{TABLE.customer_id} = {dim_customer.customer_id}"
    columns:
      - name: order_item_id
        type: uuid
        primary_key: true

      - name: order_id
        type: uuid

      - name: customer_id
        type: uuid

      - name: product_id
        type: uuid

      - name: quantity
        type: int
        mean: 1.8
        std: 1.2
        min: 1
        max: 20

      - name: unit_price
        type: float
        mean: 1200
        std: 2000
        min: 49
        max: 150000

      - name: discount_per_item
        type: float
        mean: 60
        std: 120
        min: 0

      - name: item_subtotal
        type: float
        expr: unit_price * quantity - discount_per_item * quantity

      - name: item_tax
        type: float
        expr: item_subtotal * 0.18

      - name: item_total
        type: float
        expr: item_subtotal + item_tax

      - name: is_returned
        type: bool
        values:
          "false": 93
          "true": 7

      - name: return_reason
        type: string
        values:
          damaged: 30
          wrong_item: 25
          not_as_described: 25
          size_issue: 20
        null_unless: is_returned = true

      - name: created_at
        type: datetime
        start: 2025-01-01
        end: 2026-06-30
