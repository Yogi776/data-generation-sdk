# Declarative retail dataset spec — dim_customer + dim_product + fact_order + fact_order_item
#   adp apply-spec spec.yaml
#   adp generate-data --rows 50000
version: 1
tables:
  # ═══════════════════════════════════════════════════════════
  # dim_customer
  # ═══════════════════════════════════════════════════════════
  - name: dim_customer
    rows: 500000
    columns:
      - name: customer_id
        type: uuid
        primary_key: true

      - name: customer_number
        type: string

      - name: first_name
        type: string

      - name: last_name
        type: string

      - name: email
        type: string

      - name: phone_number
        type: string
        null_ratio: 0.3

      - name: date_of_birth
        type: date
        start: 1960-01-01
        end: 2006-12-31

      - name: age
        type: int
        min: 18
        max: 66

      - name: gender
        type: string
        values:
          Male: 48
          Female: 50
          Other: 2

      - name: loyalty_tier
        type: string
        values:
          Standard: 60
          Silver: 25
          Gold: 12
          Platinum: 3

      - name: loyalty_points
        type: int
        mean: 320
        std: 500
        min: 0
        max: 50000

      - name: signup_date
        type: date
        start: 2020-01-01
        end: 2026-06-01

      - name: account_status
        type: string
        values:
          Active: 88
          Inactive: 10
          Churned: 2

      # hierarchical dependency: country -> state -> city (order matters)
      - name: country
        type: string
        values:
          India: 90
          USA: 10

      - name: state
        type: string
        values_by:
          column: country
          mapping:
            India:
              Maharashtra: 26
              Karnataka: 20
              Tamil Nadu: 15
              Delhi: 13
              Telangana: 13
              Gujarat: 13
            USA:
              California: 30
              Texas: 25
              New York: 20
              Florida: 15
              Illinois: 10

      - name: city
        type: string
        values_by:
          column: state
          mapping:
            Maharashtra:
              Mumbai: 55
              Pune: 35
              Nagpur: 10
            Karnataka:
              Bangalore: 82
              Mysore: 18
            Tamil Nadu:
              Chennai: 75
              Coimbatore: 25
            Delhi:
              New Delhi: 100
            Telangana:
              Hyderabad: 100
            Gujarat:
              Ahmedabad: 62
              Surat: 38
            California:
              "Los Angeles": 40
              "San Francisco": 35
              "San Diego": 25
            Texas:
              Houston: 40
              Dallas: 35
              Austin: 25
            "New York":
              "New York City": 70
              Buffalo: 30
            Florida:
              Miami: 45
              Orlando: 35
              Tampa: 20
            Illinois:
              Chicago: 80
              Springfield: 20

      - name: postal_code
        type: string

      - name: preferred_payment_method
        type: string
        values:
          UPI: 35
          Credit Card: 25
          Debit Card: 20
          Wallet: 12
          COD: 8

      - name: preferred_device
        type: string
        values:
          Mobile: 65
          Desktop: 28
          Tablet: 7

      - name: acquisition_source
        type: string
        values:
          Organic: 30
          Google: 25
          Facebook: 20
          Instagram: 15
          Referral: 10

      - name: total_orders
        type: int
        mean: 8
        std: 10
        min: 1
        max: 200

      - name: total_spent
        type: float
        mean: 15000
        std: 22000
        min: 100

      - name: average_order_value
        type: float
        mean: 1800
        std: 1500
        min: 100

      - name: last_order_date
        type: date
        start: 2024-01-01
        end: 2026-06-30

      - name: churn_risk
        type: string
        values:
          Low: 55
          Medium: 30
          High: 15

      - name: created_at
        type: datetime
        start: 2020-01-01
        end: 2026-06-01

  # ═══════════════════════════════════════════════════════════
  # dim_product  — all 9 review fixes applied
